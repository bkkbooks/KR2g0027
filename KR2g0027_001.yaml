body:
  text: 慶元黨禁首末偽黨共五十九人宰執四人趙汝愚右丞相饒州留正少保觀文殿大學士泉州王藺觀文殿學士知潭州廬江周必大少傳觀文殿大學士吉州待制已上十三人朱熹焕章閣待制兼侍講建寧徐誼權工部侍郎溫州彭龜年吏部侍郎台州陳傅良中書舍人兼侍讀兼直學士院溫州薛叔似權户部侍郎兼樞密都承旨永嘉章頴權兵部侍郎兼侍講婺州鄭湜權刑部侍郎福州樓鑰權吏部尚書眀州林大中吏部侍郎婺州黃由權禮部尚書平江黃黼權兵部侍郎臨安何異權禮部侍郎撫州孫逢吉權吏部侍郎吉州餘官三十一人劉光祖起居郎兼侍讀蜀吕祖儉太府寺丞婺州葉適太府少卿總領淮東財賦溫州楊芳祕書郎汀州項安世校書郎荆南沈有開起居郎常州曽三聘知郢州臨江軍遊仲鴻軍器監簿果州吳獵監察御史潭州李祥國子祭酒常州楊簡國子博士明州趙汝讜添差監左藏西庫趙汝談前淮西安撫司幹官陳峴校書郎溫州范仲黼著作郎兼權禮部郎官成都汪逵國子司業信州孫元卿國子博士袁燮太學博士眀州陳武國子正溫州田淡宗正丞兼權工部郎官南劎黃度右正言紹興詹體仁太府卿蔡幼學福建提舉溫州黃灝浙西提舉常平茶鹽公事周南池州教授平江吳柔勝新嘉興府教授宣州李􅌫校書郎蜀王厚之直顯謨閣江東提刑紹興孟浩知湖州袁州趙鞏祕閣修撰知揚州白炎震新通判成都府普州武臣三人皇甫斌池州都統制范仲壬知金州張致逺江西兵馬鈐轄南劒太學生六人楊宏中周端朝張衟林仲鱗蔣傳徐範士人二人蔡元定編管道州嘉定三年奉聖旨特賜迪功郎吕祖泰決杖配欽州嘉定元年奉聖旨特補迪功郎監潭州南嶽廟已上並見於當時臺諫章疏秀巖李心傳朝野雜記所編攻偽學人京鏜右丞相洪州何淡樞密虔州劉德秀諌議大夫洪州胡紘御史處州倪思尚書湖州李沐正言湖州劉三傑正言婺州施康年正言通州姚愈大諫平江陳賈兵部侍郎舒州楊大法侍御婺州張釡大諌鎮江錢象祖參政台州葉翥尚書處州許及之樞密溫州張巗侍御揚州陳讜侍郎軍興化傅伯夀侍郎泉州汪義端中書舍人徽州高文虎直院明州張伯垓察院秀州鄧友龍察院衡州麋師旦吏部侍郎平江趙善堅林采監察御史沈繼祖監察御史興國丁逢川秦都大常州邵褒司直秀州王沇轉運使錢鍪衡州守余嚞新州教授漳州趙師召迪功郎張貴謨處州黃掄鄭丙淳熙間吏部尚書福州林栗淳熙間兵部尚書福州王淮淳熙問丞相婺州寧宗皇帝之登極也丞相趙汝愚時知樞密院求能通意於慈福者有知閣門事韓托胄自詭於太皇太后為親屬請效力遣入白不許出遇內侍關禮於門告之禮請獨入泣涕固請太皇許之命與托胄復入使諭意於汝愚其論遂定托胄繇此自謂有定策功且依托肺腑出入宫掖居中用事時汝愚方收召四方知名之士聚於本朝海內引領以觀新政而事已多從中出初上在潛邸聞朱熹名每憾不得為本宫講官踐阼之日以焕章閣待制召於長沙熹在先朝纍召不至至輒不留至是即日上道惕然以時事為憂於免牘已寓其意云陛下嗣位之初方將一新庶政所宜愛惜名器不可輕以假人若使僥幸之門一開其弊豈可復塞未幾內批逐首相留正熹至上饒聞之益有憂色暨對行宫便殿首奏陳之有曰發號施令無一不出乎朝廷進退人才無一不合乎公論不為偏聽以啓私門則釁孽之萌不得作矣今日之計莫大於此又再三面言之又約吏部侍郎彭龜年同請對白發托胄之姦適龜年出護使客托胄益得為計熹纍白汝愚當以厚賞酬其勞勿使得預朝政且有分界限立紀綱防微杜漸謹不可忽之語汝愚方謂其易制不之虞登聞鼓院遊仲鴻汝愚客也力諌汝愚不聽而所倚以為腹心謀事者又皆持祿茍安無復逺慮右正言黃度欲論托胄謀泄又以內批斥去熹不勝憤遂因講畢奏疏極言之略曰朝廷紀綱所當嚴今陛下即位未能旬月而進退宰執移易臺諌皆出於陛下之獨斷大臣不與謀給舍不及議正使實出於陛下之獨斷其事悉當於理亦非治世之體况中外傳聞皆謂左右或竊其柄而其所行又未能盡允於公議此弊不革臣恐名為獨斷而主威不免於下移欲以求治而反不免於致亂蓋自隆興以來已有此患臣嘗再三深為夀皇論之非獨今日之憂也尚賴夀皇聖性聰眀更練世事故於此輩雖以驅使之故稍可假借實亦隂有以制之未至全墮其計然積習成風貽患於後其害有不可勝言者如陳源袁佐之流皆陛下所親見奈何又欲襲其迹而蹈之乎願陛下深詔左右勿預朝政但使朝廷尊嚴紀綱振肅而國家有泰山之安則此等自然不失長久富貴之計其實有勳勞而所得褒賞未愜衆論者亦詔大臣公議其事參稽令典厚報其勞而凡號令之弛張人才之進退則一委之二三大臣使之反覆較量勿徇己見酌取公論奏而行之批旨宣行不須奏覆但未令尚書省施行先送後省審覆有不當者限以當日便行繳駁如更有疑則詔大臣與繳駁之官當晚入朝面議於前互相論難擇其善者稱制臨決則不惟近習不得干預朝權大臣不得專任己私而陛下亦得以益明習天下之事而無所疑於得失之算矣臣老病之餘寒齋獨宿終夜不寐憂慮萬端至於孤危之蹤不敢自保竊恐自今以往不獲久侍清間之燕矣疏入托胄大怒隂與其黨謀去其為首者則其餘去之易爾所謂首者蓋指熹也乃於禁中令優人效熹容止為戲熒惑上聽熹時急於致君知無不言言無不切亦頗見嚴憚於是托胄之計遂行及熹講筵留身再乞施行前疏退則內批徑下朕憫卿耆艾當此隆冬恐難立講已除卿宫觀可知悉時紹熙五年甲寅冬閏十月十九日甲戌也汝愚獨袖內批還上且諌且拜托胄必欲出之汝愚退求去不許二十一日托胄使中使王德謙封內批以授熹熹即附奏謝遂行二十二日給事中樓鑰封還録黃舍人鄧驛面奏乞留熹上許除京祠已而不下二十三日起居郎劉光祖又言之二十四日中書舍人陳傅良再封還録黃二十五日有旨除熹寶文閣待制與郡劉光祖再上疏留行不報樓鑰再封還録黃二十七日有旨依已降指揮工部侍郎兼侍講黃艾因講問逐熹之驟􅈤􅈤再三不已吏部侍郎兼侍講孫逢吉上疏留熹又因講權輿之詩反覆以諷上曰朱熹所言多不可用時托胄欲用優人王喜為閣門祗候喜即前日效熹為戲者逢吉誦言將入諌乃止監察御史吳獵入劄子乞留不報登聞鼓院遊仲鴻上言朱熹海內名儒首蒙收召四方傳誦以為天下大老歸之才四十餘日復有宫祠之命逺近相弔以為天下大老去之則人孰不欲去者若正人盡去陛下何以為國願亟還朱熹毋使小人得志養成亂階時托胄勢方盛人皆為仲鴻危之熹以十月辛卯入見中間進講者七內引留身奏事者再面對賜食各一在朝甫四十有六日云熹去彭龜年遂徑論托胄竊弄威福為中外所附不去必貽患讀劄子畢又奏只緣陛下近日逐得朱熹太暴故欲陛下亦亟去此小人毋使天下人謂陛下去君子如此之易去小人如此之難上初欲兩罷之汝愚開陳欲兩留之既而內批彭龜年與郡節度使吳琚嘗言時上無堅留托胄意使有一人繼之則去之必矣托胄既留勢益張先是托胄恃功意望建節憾汝愚抑之有怨言僉書樞密院羅點慰解之徐誼為京尹勸汝愚以節度與之汝愚悔遣人諭托胄托胄答語不遜遂日夜謀引其黨為臺諫以擯汝愚汝愚為人疏直不虞其姦會汝愚奏除劉光祖侍御史方進呈知樞密院陳騤忽奏曰光祖與臣有嫌今光祖入臺願先避位汝愚愕然而止托胄遂以內批除謝深甫御史中丞蓋托胄與騤合謀已定獨汝愚未之覺耳汝愚奏乞令近臣舉御史有大理寺簿劉德秀者與托胄深交乃諭中司令薦德秀時近臣薦者甚衆托胄下內批令用中司舉者德秀既除監察御史其黨以次而進言路遂皆托胄之人工部尚書趙彥逾者汝愚謀立上時遣達意於殿帥郭杲事定亦冀汝愚引已同升已而止除端眀殿學士知建康彥逾遂與托胄合未幾改除四川制置彥逾愈憾入辭疏廷臣姓名於上指為汝愚之黨曰老奴已去不惜為陛下言之而上亦疑矣會僉書樞密院羅點尚書黃裳卒裳潛邸舊臣上所倚信點既卒托胄又亟擢其黨京鏜汝愚由是益孤至是中書舍人陳傅良監察御史吳獵起居郎劉光祖各先後斥去羣憸附和視正人如冦讐衣冠之禍自此始矣托胄欲逐汝愚而難其名或教之曰彼宗姓誣以謀危社稷則一網盡矣托胄然之慶元元年乙卯春正月二十五日辛亥遂擢其黨將作監李沐為右正言使擊汝愚二月二十一日丁丑右正言李沐上殿乞罷汝愚政柄以奠安天位塞絶姦原是日右丞相趙汝愚乞罷政出浙江亭待罪詔使宣押赴都堂治事李沐又乞更不宣押是晚鎖院二十二日戊寅汝愚罷右丞相除觀文殿大學士知福州制詞略曰頃我家之多難賴碩輔之精忠持危定傾安社稷以為悅任公竭節利國家無不為既隆翊戴之勳尚期啓沃之助力陳忱悃祈避煩言起居郎權直學士院鄭湜草也湜坐無貶詞免兼學士院未幾罷去二十三日己卯權兵部侍郎章頴與郡以上疏留汝愚也右正言李沐論其附上罔下繼與宫觀二十四日庚辰工部侍郎知臨安徐誼亦坐上疏論救汝愚罷去御史中丞何淡殿中侍御史楊大法監察御史劉德秀劉三傑論汝愚冒居相位今其罷免不當加以書殿隆名帥藩重寄伏丐寢其福唐之命令其職名奉祠杜門省咎二十八日甲申有旨依所乞觀文殿大學士提舉臨安府洞霄宫國子祭酒李祥博士楊簡復上疏留汝愚李沐又劾之三月二十九日甲寅祥簡並罷夏四月二日太府寺丞吕祖儉疏留汝愚併論朱熹彭龜年等不當逐語侵托胄四日戊午詔吕祖儉朋比罔上送韶州安置中書舍人鄧驛封還録黃五日詔祖儉志在無君其罪當誅姑從竄斥以示寬容自合書行於是太學生楊宏中周端朝張衟林仲鱗蔣傳徐範六人伏闕上書其略曰臣聞自古國家禍亂之由初非一道而小人中傷君子其禍尤慘君子登庸杜絶邪枉要其處心實在於愛君憂國羣小得志讎視正人必欲盡去其朋黨然後肆行而無忌於是人主孤立而社稷危矣黨錮敝漢朋黨亂唐大率由此元祐以後邪正交攻卒成靖康之變我宋不競貽禍至今此臣子所不忍言陛下所不忍聞者臣竊見近者諌官李沐論前相趙汝愚所為乖戾隨即罷去若慮陛下父子之際懷不自安故黜汝愚以謝天下亦未為過如沐所言則以為汝愚自居同姓數談夢兆專政擅權欺君植黨殆將不利於陛下以此加詆其實不然汝愚之去中外咨憤而李沐以為父老歡呼蒙蔽天聽一至於此道路譁然以為沐內結權幸隂有指授率爾肆言全無忌憚廟堂屏息不敢異論天下扼腕氣將奚伸其氣焰已足以熏灼朝路撼搖國勢陛下若不亟治漸成孤立後雖悔之亦無及矣陛下獨不念去嵗之事乎人情危疑變在朝夕當是時假非汝愚出死力定大議使陛下得以成夀康皇帝揖遜之志行孝宗皇帝未舉之喪雖百李沐罔知攸濟當國家多難汝愚方位樞府本兵柄指揮操縱何向不可不於此時為利上下安妥乃有異意乎李沐輒以危言悚脅陛下巧於中傷君子立威名情狀敗露願陛下鑒漢唐之禍懲靖康之變精加宸慮特奮睿斷念汝愚之忠勤灼李沐之回邪明示好惡旌别淑慝竄李沐以謝天下六日庚申詔宏中等妄亂上書扇搖國是各送五百里外編管中書舍人鄧驛言臣仰惟國家開設學校教養士類德至渥也自建太學以來上書言事者無時無之纍朝仁聖相繼天覆海涵不加之罪甚者押歸本貫或他州聽讀而已紹熙間有布衣俞古上書狂悖若以指斥之罪坐之誠不為過太上皇帝始者震怒降旨編管已而臣寮論奏竟從寬典陛下今日編管楊宏中等六人若以扇搖國是罪之則未若指斥乘輿之罪大以六輩言之則一夫為至寡聖眀初政仁厚播聞睿斷過嚴人情震駭所有録黃臣未敢書行詔驛依已面諭施行未幾驛罷知泉州工部侍郎兼知臨安府錢象祖遣人逮捕諸生押送貶所宏中衟仲鱗範皆福州人端朝溫州人傳信州人傳久居學校忠鯁有聞扣閽之事皆其屬藁同日李沐除右諌議大夫劉德秀除右正言時知名之士罷斥相繼人情洶洶托胄患之侍御史楊大法右正言劉德秀乃乞降詔以國是尊君中道等事訓飭在廷有不如詔者重置典憲五月十三日命直學士院傅伯夀降詔如請伯夀乃自得之子自得乾道間以不受曽覿之招名聞四方至伯夀則奴事托胄𨽻人蘇師旦致身通顯其弟伯成非其所為每切責之至是伯夀首草詔以詆善類六月十七日德秀又劾國子博士孫元卿太學博士袁燮國子正陳武皆罷去司業汪逵入劄子辨之德秀以為言逵亦罷托胄本武人志在招權納賄除不附已而已不能巧為説以網善類也先是熙寧間程皓頥傳孔孟千載不傳之學南渡初其門人楊時傳之羅從彥從彥傳之李侗朱熹師侗而得其傳致知力行其學大振學者仰之如泰山北斗而流俗醜正多不便之者蓋自淳熙之末紹熙之初也有因為道學以媒孽之者然猶未敢加以醜名攻詆至是士大夫嗜利無耻或素為清議所擯者乃教以凡相與為異者皆道學人也隂疏姓名授之俾以次斥逐或又為言名道學則何罪當名曰偽學蓋謂貪黷放肆乃人真情其亷潔好修者皆偽人也於是憸壬險狠猥薄無行之徒利其説之便已揚袂奮臂以攻偽干進而學禁之禍自此始矣二十四日劉德秀上疏乞考核真偽而辨邪正御史中丞何淡急欲執政秋七月十三日上疏論專門之學流而為偽空虛短拙文詐沽名詔榜朝堂十九日吏部郎官麋師旦建言請考核真偽遂除左司員外郎是時有張貴謨者指論太極圖説之非御史中丞何淡上言在朝之臣既熟知其邪正之迹然不敢白發以招報復之禍望眀詔大臣去其當去者七月以御史中丞何淡疏落趙汝愚大觀文冬十一月監察御史胡紘奏汝愚唱引偽徒謀為不軌責授寧逺軍節度副使永州安置徐誼坐黨汝愚亦責團練副使南安軍安置中外震駭朱熹時家居自以蒙纍朝知遇之恩且尚帶從臣職名義不容默草封事數萬言極陳姦邪蔽主之禍因以眀汝愚之寃繕寫已具子弟諸生更進迭諫以為必至賈禍熹不聽門人蔡元定入諌請以蓍決之遇遁之同人熹默然取奏藁焚之因更號遁翁遂以疾丐休致二年正月御史中丞何淡除同知樞密院事二十四日甲辰諫議大夫劉德秀劾留正四大罪首論其招引偽學以危社稷偽學之稱自此始是月二十日庚子趙汝愚殁於衡州汝愚既責零陵過衡陽而病又為守臣錢鍪所窘逐服藥而卒天下寃之時有迪功郎趙師召者上書乞斬汝愚雖事不行然托胄之黨以汝愚有定策功惟恐其復進故當時謂汝愚不死事固未可知也二十七日訃聞有旨復原官許歸葬二月省闈知舉葉翥倪思劉德秀奏論文弊上言偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之類並行除毁是科取士稍涉義理悉見黜落六經語孟中庸大學之書為世大禁夏六月乙丑度支郎中淮西總領張釡言邇者偽學盛行賴陛下聖眀罷斥姦回登用賢哲天下皆洗心滌慮不敢復為前日之習願陛下眀詔大臣上下一心堅守勿變毋使偽言偽行乘間以壞既定之規模乃除尚左郎官中書舍人汪義端引唐李林甫故事以偽學之黨皆名士欲根株斷除之一時號為君子無不斥逐太皇太后聞而非之二十六日甲戌御筆今後給舍臺諌不必更及舊事務在平正以稱朕意托胄及其黨皆怒遂令臺諌爭之於是右諌議大夫劉德秀監察御史姚愈張伯垓力爭以為不可乃改為不必專及舊事自是托胄與其黨攻治之志愈急矣御筆之出也殿中侍御史黃黼獨贊之與同列異秋七月姚愈除殿中侍御史黼除起居郎權兵部侍郎未幾罷去八月九日丙辰太常少卿胡紘言比年偽學猖獗圖為不軌近元惡殞命羣邪屏迹而或者唱為調停之議取前日偽學之姦黨次第用之望宣諭宰執應偽學之黨曽經臺諌論列者權住進擬遂遷起居舍人冬十二月三日陳賈自寧國府除兵部侍郎以賈淳煕末嘗擊朱熹故也先是熹乞追還職名及改正過待制恩數繼又乞致仕朝廷不許臺諌洶洶爭欲以熹為竒貨門人楊楫聞鄉曲射利者多撰造事迹以投合言者亟以書告熹熹報曰死生禍福久矣置之度外不煩逺慮然羣憸相顧久之不敢發獨監察御史胡紘草疏將上會遷去不果沈繼祖者為小官時嘗採托熹語孟之説以自售至是以追論程頥得為監察御史紘以藁授之繼祖鋭於進取謂可立致富貴遂奏熹剽竊張載程頥之餘論寓以喫菜事魔之妖術以簧鼓後進張浮駕誕私立品題收召四方無行義之徒以益其黨伍相與餐粗食淡衣褒帶博或會徒於廣信鵝湖之寺或呈身於長沙敬簡之堂潛形匿迹如鬼如魅及不忠不孝不仁不義不公不亷等十罪乞禠職罷祠其徒蔡元定佐熹為妖送别州編管二十六日旨依蔡元定編管道州慶元三年丁巳春正月省劄始至熹方與諸生講論有以小報來言者熹略起視之復坐講論如初詞色更為和平翼旦諸生乃知其有指揮時郡縣捕蔡元定甚急元定色不為變毅然上道熹與諸所從遊百餘人送别蕭寺坐客感嘆有泣下者熹微視元定不異平時因曰朋友相愛之情季通不挫之志可謂兩得之矣又曰季通之行無幾微不適意丘子服獨為之泣涕留連而不能已處事變恤窮交亦兩得其道也眀年元定卒於道州熹為之慟元定師事熹而熹顧曰季通吾老友也凡性與天道之妙他子弟不得聞者必與元定商榷之嘗輯其講論之辭曰翁季録者蓋引以自匹也嘗曰造化微妙惟深於理者能識之吾與季通言而未厭也及其貶也恨無可與語其殁也祭之云以精詣之識卓絶之才不可屈之志不可窮之辨不可復得而見蓋深致其哀熹嘗講中庸巳發未發之旨以為人自嬰兒至老死雖語默動靜之不同然大體莫非已發元定不以為是獨引程氏説以為敬而無失便是喜怒哀樂未發謂之中後十年熹再與元定辨論始悟其説而悉反之由是益竒元定每諸生請疑必令先質之元定而後為之折衷同門寡二以故小人深嫉之故是時有朱熹唱偽學蔡元定實羽翼之之奏也二月丁巳大理司直邵褒請眀詔大臣自今權臣之黨偽學之徒不得除在內差遣六月癸卯言者又論三十年來偽學顯行場屋之權盡歸其黨所謂狀元省元與兩優釋褐者非其私徒即是其親故望詔大臣審察其所學而後除授宣教郎錢文子時以太學兩優釋褐一任回當召試徑就部注潭州醴陵知縣而去時人稱之閏六月六日戊寅朝散大夫劉三傑免喪入見論偽學之黨變為逆黨防之不可不至及論留正共引偽學之罪托胄大喜即日三傑除右正言留正送邵州居住秋九月二十七日丁卯言者論偽學之禍望申飭大臣鑒元祐調停之説杜其根源時有詔監司帥守薦舉改官並於奏牘前聲説非偽學之人且結朝典之罪秋當大比漕司前期取家狀必欲書委不是偽學五字於後時有柴中行者為撫州推官獨移文漕司稱自幼習易讀程氏易傳未委是與不是偽學如以為偽不願考校士論壯之冬十二月丁酉知綿州王沇乞置偽學之籍仍自今曽受偽學薦舉關升及刑法亷吏自代之人並令省部籍記姓名與間慢差遣吏部侍郎黃由奏人主不可待天下以黨與不必置籍以示不廣殿中侍御史張巖論由阿附權臣植立黨與由遂罷去未幾擢沇利路轉運判官慶元四年戊午夏四月右諌議大夫姚愈上言近世行險僥幸之徒倡為道學之名權臣力主其説結為死黨願下眀詔播告天下五月己酉遂命直學士院兼中書舍人高文虎草詔曰賴天之靈宗廟之福朕獲承慈訓膺受內禪隂謀壞散國勢復安嘉與士大夫勵精更始凡曰淫朋比德幾其自新而歷載臻兹弗迪厥化締交合盟窺伺間隙毁譽舛乖流言間發將以傾國是而惑衆心甚至竊附於元祐之諸賢而不思實類乎紹聖之姦黨國家秉德康寧弗汝瑕殄今惟自作弗靖意者漸於流俗之失不可復反與將狃於國之寬恩而罰有弗及歟何其未能洗滌以稱朕意也朕既深詔二三大臣與夫侍從言議之官益維持正論以眀示天下矣諭告所抵各宜改視回聽毋復借疑似之説以惑亂世俗若其遂非不悔怙終不悛邦有常刑必罰無赦布告天下毋忽愈上此奏托胄大喜之未幾遂遷兵部尚書御史中丞秋七月己未直寶文閣都大川秦茶馬丁逢入見極論元祐建中調停之害且引蘇轍任伯雨之言為證時薛叔似葉適坐汝愚黨久斥皆起家為郡故逢有是言宰執京鏜何淡大然之翼日除軍器監慶元五年己未正月詔彭龜年追三官勒停曽三聘追兩官蔡璉補進義校尉用璉誣告汝愚事也初汝愚定策之時直省官蔡璉從旁竊聽欲行漏泄汝愚覺而囚之上即位遂從輕決配四年冬竄歸輦下用事者聞之以為竒貨乃使璉排日供具誣汝愚定策時有異謀凡往來賓客所言七十餘紙文書既就乃議送大理時托胄之黨欲捕龜年三聘及徐誼沈有開葉適項安世等送棘寺中書舍人范仲藝草駁奏袖録黃見托胄語之曰公今日得君凡所施為當一以魏公為法章蔡之權非不盛至今得罪清議以同文之獄故爾托胄曰某初無此意以諸公見迫不容但已問其人乃知京鏜劉德秀實主其事托胄取録黃藏之事遂格既而諫官張釡陳自強御史劉三傑張巖程松連疏有請詔以纍經赦宥遂有是命鏜德秀在托胄之門最為凶險托胄未顯時惟二人與之深交及用事所為暴悖皆二人教之是嵗劉光祖撰涪城學記有世方以道為偽而以學為棄物夫好惡出於一時是非定於萬世學者盍謹所先入以待豪傑之興之語二月乙酉右諫議大夫張釜劾劉光祖佐逆不臣蓄憤懷姦欺世慢上五罪詔光祖落職房州居住夏四月辛亥監都進奏院鄧友龍請眀詔大臣用捨從違謹所決擇友龍尋除監察御史秋九月十一日甲子進士吕祖泰投匭上書略曰道與學自古所恃以為國也丞相趙汝愚今之有大勳勞者也立偽學之禁逐汝愚之黨是將空陛下之國而陛下不悟耶陳自強何人也徒以托胄童孺之師而躐致禁從陛下舊學之臣若龜年等今安在哉蘇師旦平江之胥吏周筠韓氏之厮役人盡知之今師旦以潛邸隨龍周筠以皇后親屬俱至大官不知陛下在邸時果識所謂師旦者乎椒房之親果有所謂周筠者乎其妄自尊大卑陵朝廷一至於此也願陛下亟誅托胄及蘇師旦周筠而罷逐陳自強之徒故大臣在者獨周必大可用宜以代其任不然事將不測書出中外大駭托胄雖怒甚恐重違人心會方行眀堂禮故未及問十八日辛未禮成肆大眚後五日丙子乃批旨云吕祖泰挾私上書語言狂妄送連州拘管右諌議大夫程松殿中侍御史陳讜皆言祖泰有當誅之罪今縱不殺猶宜杖脊黥面竄之逺方是日得旨令送臨安府從杖一百真決免刺面配欽州牢城祖泰字泰然元祐户部尚書公孺之五世孫也寓居無錫縣性疏達尚氣義既得罪士大夫勞之者無悔色托胄猶憐之祖泰始自分必死獨冀以身悟朝廷就逮無懼色京尹趙善堅受托胄計為好語誘之曰誰教汝亦有共為章者乎汝第言之吾且寬汝祖泰笑曰何問之愚也吾固自知必死而可受教於人且與人議乎善堅曰汝病風喪心耶祖泰曰以吾觀之若今之附韓氏得美官者乃病風喪心耳廷中聞之悚然有嘆息者時有太學生於齋生題名中削去何淡名字以其嘗排道學也淡時已顯大怒謀於京尹因其出使不逞者與之鬨遂捕治之太學士敖陶孫者為詩以弔汝愚而托胄未得其名俾其人併承之辭不伏乃移送大理命獄丞劾其事掠治無完膚獄竟不就猶坐不應削淡名送嶺南編管陶孫詩云左手旋乾右轉坤諸公相顧尚流言狼胡跋疐傷姬旦漁父沉淪弔屈原一死固知公所欠孤忠賴有史長存九原若遇韓忠獻休説如今幾世孫陶孫福州人數年後登進士第獄丞用此除工部郎官冬十一月乙亥殿中侍御史陳讜請眀詔大臣於進擬人才之初審其邪正而毋俟乎繳駁十二月甲午議者又言今姦偽之徒呼嘯朋侣以圖報復當戒其漸望自今回心向道者姑與外祠使知小懲大戒之福其長惡弗悛負固不服者必重置典憲投之荒逺庶幾咸知懲創宿道向方慶元六年庚申三月己未朱熹寢疾病諸生惟葉賀孫蔡沉等九人在側沉元定子也辛酉解大學誠意章此為熹絶筆甲子卒於正寢是日大風拔木洪水崩山諸生近者奔訃逺者為位而哭蔡沉主喪役黃幹主喪禮冬十一月葬於建陽之唐石時偽黨禁嚴守則托胄之黨傅伯夀也然會葬亦幾千人是月庚午正言施康年言四方偽徒期以一日聚於信上送偽師朱熹之葬臣聞偽師往在浙東則浙東之徒盛在湖南則湖南之徒盛每夜三鼓聚於一室偽師身據高坐口出異言或更相問答或轉相問難或吟哦經書如道家步虛之聲或幽默端坐如釋氏入定之狀至如遇夜則入至曉則散又如姦人事魔之教觀其文則對偶偏枯亦如道家之科儀語言險怪亦如釋氏之語録雜之以魔書之詭祕倡之以魔法之和同今熹身已殁其徒不忘生則畫象以事之殁則設位以祭之容有此事然會聚之間必無美意若非妄談世人之短長則是謬議時政之得失望令守臣約束仍具已施行申尚書省從之范念德為鑄錢司主管官沿檄檢視坑場便道會葬歸未至鄱陽有旨鎸官罷任蓋臺諌劾其離次會葬云嘉泰元年辛酉春二月己亥議者又言偽學之徒餘孽未盡革願於聽言用人之際防微杜漸制觀文殿大學士致仕益國公周必大降充少保依舊職致仕先是吕祖泰上書既配欽州至是監察御史林采言偽習之成造端有自宜加黜削故有是命自熹獲罪黨禁益譁稍稱善類斥逐無遺至薦舉考校皆為厲禁姦貪狼籍暴慢恣肆之徒紛紜並起填塞要塗士知務修飭守亷隅者例取姍侮或及於禍一時從遊特立不顧者屏伏丘壑依阿愞懦者更名他師過門不入甚至變易衣冠狎遊市肆以自别其非黨熹講道於竹林精舍不為少輟時多勸熹以謝絶生徒儉德避難者熹笑而不答與學者黃幹書曰前此常患來學之徒真偽難辨今却得朝廷如此大開爐鞴煅煉一畨一等混淆夾雜之徒不須大段比磨勘辨而自無所遁其情矣先是有新州教授余嚞者上書政府乞斬熹右丞相謝深甫語人曰彼何罪暨熹既殁言者猶不能已蓋托胄用事以來一等小人知素不齒於名教懼一旦善類復用而已斥去於是橫身以任其責京鏜何淡劉德秀胡紘四人實專偽學之禁為托胄斥逐異己者羣小附之牢不可破鏜淡德秀皆江西人鏜淳熙中以檢正報謝北廷固爭撤樂孝宗嘉之遂除侍從會汝愚自蜀召還上諭大臣除鏜四川帥汝愚聞之謂人曰鏜望輕資淺豈可當此方面由是兩人有隙汝愚得政鏜時為刑部尚書亟納交於托胄繼擢執政自是為托胄謀主丙辰春正月遂除右丞相德秀自重慶守入朝不為時相留正所知以著作佐郎范仲黼正之客也請為之地正曰此人若留之班行朝廷無安靜之理不得已除大理寺簿德秀怨仲黼薦已不力併憾之托胄既除德秀監察御史遂為托胄鷹犬丙辰春既劾正四大罪遂併仲黼罷之胡紘甲寅冬才為進奏院未為人所知趙汝愚時奪職居餘干托胄意未快會有薦紘可備鷹犬者次年六月十七日遷司農寺簿九月十七日除祕書郎十一月八日除監察御史後九十日汝愚有零陵之命用紘章疏也時托胄欲論朱熹無敢先發者紘鋭然任責物色無所得經年醖釀章疏乃成會建方喪之義遷太常少卿紘遂以藁授沈繼祖淡始以留正薦自權兵部侍郎除右諌議大夫首擊周必大罷之未幾遷中執法一時名士排擊殆盡大為清議所薄會有本生繼母之喪徘徊不肯去太學生喬嚞等移書切責之太常亦謂當申心喪不得已乃去位時辛亥秋八月也癸丑冬十一月當免喪時汝愚已執政止除焕章閣學士知眀州淡愈怨憾祈哀托胄乙卯夏五月遂除淡御史中丞自是力主偽學之禁以至執政己未春二月三日紘罷吏部侍郎七月二十三日德秀自吏部尚書出知婺州庚申秋八月十四日鏜以左丞相死於位獨淡未去也辛酉嵗七月十三日淡罷知樞密院事魁憸盡去托胄亦厭前事欲稍示更改以消釋中外意時亦有勸其開黨禁以杜他日報復之禍者托胄以為然嘉泰二年壬戌春二月朔詔責寧逺軍節度副使永州安置趙汝愚曩因衆論嘗挂深文朕以其屬籍之聨纍經赦宥可復資政殿學士於是黨人之見在者徐誼劉光祖陳傅良章穎薛叔似葉適曽三聘項安世范仲黼黃灝詹體仁遊仲鴻諸人咸先後復官自便或典州或宫觀又削薦牘中不係偽學一節俾勿復有言時朱熹殁已逾年而周必大留正各已貶秩還政十月二十四日詔朱熹以次對致仕閏十二月制復周必大少傅留正少保嗣後偽禁稍解然宗師既亡義禮日喪風俗自是大壞托胄以専擅為當然而恣其所為小人以無耻為常事而恬不之愧舉朝之臣知有托胄而不復知有人主雖往時坐黨被斥之人亦有趦趄於托胄之門者矣其禍極於開邊而後已許及之舊與薛叔似同擢補遺皆為善類所豫黨事既起叔似纍斥逐許乃更遷給事中吏部尚書既而踰二年不遷乃間見托胄敘其知遇之意及衰遲之狀不覺涕零繼以屈膝托胄惻然語之曰尚書才望簡在上心行且進拜矣不數日遂除同知樞密院事托胄嘗值生辰羣公上夀既畢集矣許為吏部尚書適後至閽人掩關拒之許大窘會門閘未及閉遂俯僂而入當時有由竇尚書屈膝執政之語傳以為笑托胄有愛姬小故而出錢塘知縣程松聞之亟賂牙儈以八百千市之至則盛供帳舍之中堂夫婦上食事之甚謹姬皇恐莫知所為居數日托胄意解復召之則知其事大怒松即上謁曰頃聞有郡守赴闕者欲得斯人懼逺方小吏不識事體他日有誤鈞顔某忝為赤縣職所當知故為王取之耳托胄意稍解姬既再入托胄尚未平姬具言松所以謹待之禮托胄大喜即日躐除太府寺丞後兩旬遷監察御史踰年擢右正言數月遷右諌議大夫既而滿嵗未遷殊怏怏乃市一妾獻之名松夀托胄遣問之曰奈何與大諌同名答曰欲使疵賤姓名常達鈞聽耳托胄憐之遂除同知樞密院事距留妾恰三年其後帥蜀貶官責詞有處汚穢而不羞莫汝為甚之句蓋謂是也松池州人托胄妻早死有四妾皆得郡封所謂四夫人也其次又十人亦有名位丁巳秋冬之間有獻北珠冠四枚者托胄喜以遺四夫人其十人皆愠曰等人耳我輩不堪戴耶托胄患之趙師􅋷時以列卿守臨安微聞其事托胄入朝未歸京尹忽遣人致餽啓之十珠冠也十人者大喜分持以去托胄歸左右以告托胄未及有言十人者咸來致謝遂已翌日都市行燈羣婢皆頂珠冠而出眀日語托胄曰我曹夜來過朝天門都人聚觀直是喝采郡王奈何不與趙大卿轉官耶翌日又言之於是有工部侍郎之命正月十八日也托胄嘗與衆客飲南園過山莊指其竹籬茅舍曰此真田野間氣象所惜者欠雞鳴犬吠耳少焉有犬嘷於叢薄之下亟遣視之京尹趙侍郎也托胄大笑其後師􅋷坐他事罷官諸生為詩誚之有也曽學犬吠村莊之句指此也紹興末年以來臺諌每月必一請對察官每月必一言事從官兩月必一求見否則謂之失職自托胄扼塞言路從官既不言事臺官亦多牽掣凡所論列若位望稍高之人蓋皆有所受此外則每月將終必按小吏一二人謂之月課始者猶及釐務官與郡守之屬已而寖及屬官曹掾最後則簿尉監當皆在月課之列矣又泛論君德時事之類皆取其陳熟緩慢純無攖拂者言之以至百官輪對監司帥守奏事亦然或問之則愧謝曰聊以藉手臺諌官則曰聊以塞責有監察御史當應課乃言都城貨炒栗者皆以黃紙包之非便乞禁止聞者哂之陳自強丙辰夏以選人入都欲求諸州學官闕見執政皆不遂其所居逆旅主人善拂茶自強一日見其出問所之曰某為儀同擊茶月給十千日三往府中每往擊茶一甌而已餘無事也自強太息曰我嘗權儀同先生主人曰官人求闕不遂盍見儀同乎自強曰吾貧旅費垂盡聞見儀同所費不少安能辦之主人曰俟語次試為拈出旬餘無耗一日自強方悶坐有直省官持呼召來者約來日午後至府相見自強莫知所謂比至則侍從官以次畢集謁入傳令先召知丞托胄命設褥於堂上鄉之再拜次召從官同坐從官踧踖莫敢居上者托胄徐曰先生老儒沉沒可念坐客唯唯眀日連章薦其才遂除太學録未踰年遷博士數月轉國子又數月為祕書郎入館半嵗除右正言右諌議大夫御史中丞入臺半月餘遂秉政繇選人至樞府首尾四年托胄用事賄賂盛行四方饋遺公至宰執臺諫之門人亦不以為訝其所用如自強之徒尤貪鄙書題無并字者輒不開嘉泰之火自強為右揆火及其府主帑吏請管鑰於自強自強聞變口呿而不能言鑰在其衣帶間吏不敢解由是囊槖無孑遺者自強移居都亭驛平旦百僚往省之自強大言曰郭殿前號令可謂不肅衆謂救火無策未敢對自強徐言曰昨從渠假五十兵般擔仗遂失去一金注碗衆愕而退事定托胄謂羣公曰丞相生事一委於火可憐須當少助之於是托胄首遺萬緍已而餽者踵至諸道及列城皆有助不數月得六十萬緍遂倍所失之數火之始作也或為之賦曰公議不眀臺遂焚於御史斯文未喪省僅保於祕書其末句云嗚呼自生民以來未嘗見此一火有選人家閩中其父與自強有舊入都求為掌故自強對衆厲聲曰外間豈不知近旨見闕方除此何可得衆為之踧踖後旬日竟除掌故或疑其由徑而得者問之徐曰丞相耳或曰丞相前日之語甚峻何以回造化耶其人即坐側取一幅示之乃自強答書也略曰珍貺鼎至光耀老目或問珍貺之名曰書生安得珍玩比所請不遂適從王家肆中見金粟臺盞十具重百星以四千緍得而獻之耳聞者嘆息而去丁巳嵗托胄生辰宰執侍從至四方牧守皆上禮為夀直寶文閣四川茶馬獻紅錦壁衣承塵地衣之屬修廣高下皆與中堂等蓋密量其度而為之也吏部尚書獻紅牙果卓十位衆已駭之權工部尚書獻真珠搭襠十副光彩奪目蓋大長公主奩中故物司農卿兼知臨安府最後至出小合曰寒生無以為獻有少果核姑侑一觴啓之乃粟金蒲萄小架上有大北珠百枚衆皆慙沮丁卯嵗托胄生辰大臣以下皆排列所獻於天慶觀之廡下都人競往觀之其首列有紅榜大書云門生特進右丞相兼樞密使秦國公陳自強恭遇恩主太師平章郡王降誕之辰仰祝鈞算師旦者平江書佐托胄頃為兵馬鈐轄從府假筆吏吏以其冷局俾師旦行托胄滿歸復還府下丘崈為守嘗以事怒師旦編管秀州久之托胄知閣門事師旦困甚往依之托胄置之門下未久上登極遂以師旦歸竄名藩邸吏士內用隨龍恩得官托胄以其辨慧愛之每朝廷有議論或使之傳言於大臣大臣亦與之立語而已當時侍從或與之接坐陳自強在禁林事師旦尤謹有愛妾曰蠟梅以秀慧聞於東南師旦至其家則三人參坐縱飲未幾師旦除帶御器械遷知閣門事樞密都承旨幹辦皇城司權勢日盛乃自名蘇氏之出子陳韡總蜀計為建景蘇樓於眉州市以悅之嘉泰三年癸亥夏五月戊寅陳自強拜右丞相首除師旦定江軍節度使又有周筠者本托胄家蒼頭亦冒恭淑皇后姨夫補官為浙西兵馬都監權任在師旦之亞吳氏世職西陲威行四蜀列聖皆留其子孫於朝所以為慮者甚逺吳曦久蓄歸蜀之志朝廷不許托胄欲握兵權辛酉改元秋八月己卯遂遣曦還蜀為諸軍都統制開邊之禍始此嘉泰四年甲子春正月辛棄疾入見陳用兵之利乞付之元老大臣托胄大喜遂決意開邊開禧元年乙丑夏六月二十六日壬子宰執陳自強等四人援國朝故事乞命托胄兼領平章臺諌鄧友龍等相繼有請秋七月四日己未自強等再奏五日庚申托胄除平章軍國事十日乙丑樞密都承旨蘇師旦除安逺軍節度使在京宫觀開禧二年丙寅春三月十二日癸巳命吳曦為四川宣撫副使夏四月十七日戊辰兼陜西招撫使二十六日丁丑曦遣客姚淮源詣金獻關外四州求封為蜀王五月十四日癸巳諸軍大會於唐州六月金人封曦為蜀王賜以金印冬十月二十九日丙子金人渡淮十二月二十六日壬申夜興州天赤如血照地如晝自月初有兩日摩於初晴之時至是復有此異二十七日癸酉吳曦稱蜀王開禧三年丁卯春正月二十八日甲辰曦僣位於興州二月十三日己未曦反書聞朝廷大震托胄與曦書許以茅土之封書與御劄同發二十九日乙亥四川隨軍轉運安丙以義士楊巨源正將李好義之衆討曦誅之蜀口淮漢之民死於兵火者不可勝數社稷幾殆而托胄弄兵之意未已國人憂之於是有去凶之議焉十一月三日乙亥上與兩宫大臣定計托胄伏誅御筆韓托胄罷平章軍國事與在外宫觀陳自強阿附充位不恤國事可罷右丞相日下出國門時禮部侍郎史彌逺兼資善堂翊善建去凶之策久之得密旨乃以告參政錢象祖李壁二日甲戌皇子榮王入奏遂有此旨仍命殿前司中軍統制權主管本司公事夏震選兵三百防護托胄别選兵二百守其府門錢象祖欲奏審彌逺往其府趣之李壁亦言恐事留或泄乃已次早托胄入朝至太廟前震呵止之其從者皆散護聖步軍準備將夏挺以帳下親隨三十四人擁托胄車以出中軍正將鄭發王斌引所部三百執弓鎗刀斧護至玉津園側殛殺之是日新除諌議大夫林行可方請對自強至漏舍語同列曰大坡今日上殿俄而托胄前驅至象祖倣徨不知所出尋報托胄已押出權吏部尚書兼權給事中陸峻工部侍郎兼知臨安府趙善堅聞之失色相與耳語同列叱之象祖探懷中堂帖授自強曰有旨丞相罷政自強即上馬顧曰望二參政保全象祖壁赴延和殿奏事四日丙子托胄自強並罷為醴泉觀使五日丁丑責托胄為和州團練使郴州安置自強追三官永州居住蘇師旦特決脊杖二十配吉陽軍六日戊寅詔托胄改送英德府安置自強責授武泰軍節度副使依舊永州居住是日又詔托胄除名勒停送吉陽軍籍沒家財自強送韶州並安置有司簿録托胄家得師旦所與書云步軍司人少殿前司人多今欲殿前司人只與步軍司相等却撥殿司所多之人别立一軍使信臣掌之信臣師旦自謂也七月己卯詔師旦處斬命廣東憲臣蒞其刑妻子編置周筠決脊杖刺配嶺外眀年正月右諌議大夫葉時殿中侍御史黃疇若監察御史章燮余崇龜等上言托胄專政無君僣上不道乞梟其首領置之淮甸積尸叢冢之間以謝天下三月二十六日乙未詔臨安府遣東南第三副將尹眀斫托胄棺取其首送江淮制置大使司四月十九日戊午自強再責復州團練副使雷州安置籍沒家財詔蔡璉追毁出身文字除名勒停加配贛州牢城托胄既誅熹汝愚之大忠始暴白於天下詔書加二臣贈諡嘉定元年戊辰春二月詔趙汝愚盡復元官賜諡忠定朱熹依條與致仕遺表恩澤賜諡曰文又詔應前姦言誣史並行改正於是彭龜年孫逢吉吕祖儉以次賜諡録其後黨錮諸臣以次召用秋七月四日辛丑詔吕祖泰改正過名特補上州文學改授迪功郎監潭州南嶽廟冬十二月十三日己卯詔褒録上書六士楊宏中徐範張衟各循一資周端朝林仲鱗各免文解蔣傳已亡詔以束帛賜其家十二月御筆趙汝愚特贈太師追封沂國公嘉定三年庚午夏五月詔追贈熹中大夫寶謨閣直學士門人蔡元定亦特贈迪功郎元定制曰士之遇不遇天也其或擯斥於生前而獲伸於死後天理昭昭未有久而不定者爾問學有源操履無玷杜門著書初無與於世者不幸見誣亦遭逺謫今是非已定爾則殂矣朕甚愍之其贈爾官以慰泉下死雖莫贖尚知享哉今上皇帝寶慶三年丁亥春正月御筆朕每觀朱熹所著論語中庸大學孟子注解發揮聖賢之藴羽翼斯文有補治道朕方勵志講學緬懷典刑深用歎慕可特贈太師追封信國公諡如故紹定三年庚寅秋九月改追封徽國公端平二年丙申秋八月詔汝愚配亨寧宗廟廷嘉熙元年秋八月詔汝愚追封福王淳祐元年辛丑春正月御筆周惇頤程皓程頤張載朱熹列於從祀托胄用事十四年威行宫省權震天下初以預聞內禪為已功竊取大權中則大行竄逐以張其勢始則朝廷施設悉令稟命後則託以臺諌大臣之薦盡取軍國之權決之於已裒引姦邪分布要路陵悖聖傳以正學為偽學橫誣元老以大忠為大逆私意流行凶焰日熾交通賂遺奔走四方童奴濫授以節鉞嬖妾倨肆於掖庭創鑿亭園震驚太廟之山燕樂語笑徹聞神御之所窮奢極侈僣擬宫闈凡除擢要臣選用兵帥皆取決於厮役蘇師旦之口已所欲為不復奏稟徑作御筆批出軍事既興又置機速房於私第應御前金字牌悉留其家凡所遣發未嘗關白方其出入禁廷了無顧忌雖孝宗皇帝疇昔燕坐思政之所亦偃然冒居老宫人見之為之感涕嵗時錫宴內廷親王戚里預焉可也師旦刑餘賤𨽻乃邀至其間更相酬酢褻瀆名分一至於此勢焰熏灼視公卿如奴僕宰相以下匍匐走趨一則恩王二則恩主甚者尊之以聖呼以我王除太師麻制有聖之清聖之和等語除平章麻詞有超羣倫洞聖域等語高文虎之子似孫為祕書郎因其誕日獻詩九章每章用一錫字托胄當之不辭辛棄疾因夀詞贊其用兵則用司馬昭假黃鉞異姓真王故事由是人疑其有異圖自知積失人心中外嗟怨乃為始禍之計蓄無君之謀輕動干戈圖危宗社盛夏出師沿邊赤子骨肉流離肝膽塗地死於非命不知其幾千萬人與逆曦結為死黨假之節鉞授以全蜀兵權曦之叛逆誰實使之方曦之叛蜀人盛傳金封托胄為吳王又謂托胄與曦分吳蜀之地而王之有司簿録其家多有乘輿服御如居用木圍寢用龍衾坐用升龍牙床飾以真紅絛結如此等類意欲何為察其本心稽其稔惡雖寸斬之不足以謝天下殛死之日京師士女歌舞於市方其盛時鋤害善類不遺餘力及其敗也黨錮諸賢無不録用褒賚九原哀榮千古雖暫為所抑要之以久公論未嘗不伸也而識者以中間葉適吳獵之出為憾云左綿侯貫卿曰嗚呼慶元黨禍小人之罪不容於誅矣而善類出處有可得而言乎學禁之弛嘉泰之初元也何淡罷兩府而魁憸盡托胄圖恢復而意向移君子之墨既削小人之勢遂成不極於曦叛托胄誅不止為君子謀守儉德之初心固厄窮之晚節聽小人之自為闔闢吾惟益堅其理義之壁以俟他日之復可也其或憤於久鬱樂於乍伸動其彈冠經世之念則其思猶未熟也復讎天下之大義也張忠獻抵死切齒而不得伸阜陵二十八年長太息而不得遂者一旦舉而行之誰曰不可抑開禧之事開邊也非復讎也圖不軌也非為社稷也而豫之而翼之可不可也文公夢奠語蔡沉曰道理只是恁地但須做些堅苦工夫夫能井其苦於禁盛行之時而不少堅忍於禁已懈之日豈不甚可惜也嘗謂慶元黨禍不幸如大愚西山身死於謫雖曰天不憖遺然全其節以立千萬世守道者之標準未為無所賴也文公卒於慶元之庚申學禁弛於嘉泰之辛酉天也文公在天下出處惟公是視而士節益光眀矣西山臨終别文公有書曰天下不患無人才但師道不立為可憂噫師道之立非必人才扶植之也長堤屹然衆流歸順無復東奔西決之憂善人之多良以此也至此益信善類真足為天下福師儒真足為善類主而慶元之學禁為人心禍真酷且深也豫既以其首末遺帖並刻因併取侯氏之説以俟後之君子慶元黨禁
