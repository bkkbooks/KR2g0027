body:
  text: 御題慶元黨禁宫閫通情托胄求慶元初韓托胄既専政用京鏜何淡劉德秀胡紘四人為鷹犬斥逐異己者目為偽黨宰執則趙汝愚留正王藺周必大四人待制已上則朱熹等十三人餘官則劉光祖等三十一人武臣皇甫斌等三人太學生楊宏中等六人士人則蔡元定吕祖秦二人皆貶斥禁錮及鏜淡等相繼罷死始得追復而正人之淪亡者已不少矣托胄任羣小以攻偽學終蹈誅殛自取其罪然迹其得志之由則趙汝愚不能辭過考寧宗之立也汝愚時知樞密院求能通意於慈福者托胄詭稱為太皇太后親屬汝愚遣入白乃因內侍關禮請得入使諭意汝愚其論遂定托胄由此自謂有定䇿功依託肺腑居中用事姦焰日熾甚至竊擅兵權交通吳曦幾亂國是汝愚亦因貶謫而殁宰臣當大事不以正道顧乃委信僉邪干求宫掖冀欲藉以居功不知適以貽害開門揖盜誰任其咎哉汝愚曽是缺深謀慶元黨禍延邦國揖盜開門自有由欽定四庫全書史部七提要傳記類三總録之屬慶元黨禁一卷臣等謹案慶元黨禁一卷不著撰人名氏宋史藝文志亦不著録惟見永樂大典中題曰滄洲樵叟撰蓋與紹興正論均出一人之手序稱淳熙乙巳則作於宋理宗十八年也考黨禁起於寧宗慶元二年八月弛於嘉泰二年二月是書之作蓋距弛禁時又四十四年矣宋代忠邪雜進黨禍相仍國論喧呶巳一見於元祐之籍逮南渡後和議巳成外憂暫弭君臣上下熙熙然燕雀處堂諸儒不鑒前車又尋覆轍求名既急持論彌髙聲氣交通賢姦混糅浮薄詭激之徒相率攀援釀成門户遂使小人乘其瑕隙又興黨獄以中之蘭艾同焚國勢馴至於不振春秋責備賢者不能以敗亡之罪獨諉諸韓托胄也且光寧授受之際趙汝愚等謀及宵人復處之不得其道致激成禍變於謀國尤踈恭讀御題詩章於揖盜開門再三致意垂訓深切實為千古定評講學之家不能復以浮詞他説解矣書中所録偽黨共五十九人如楊萬里嘗以黨禁罷官而顧未入籍其去取之故亦頗難解然其中宋史有傳者不及十之三四其他姓名官籍史所失載者多藉此以考見大略於論古亦為有禆至若薛叔似晚嵗改節依附權姦皇甫斌猥瑣梯榮僨軍辱國托胄既敗之後又復列名韓黨與張巖許及之諸人並遭貶謫隂陽反覆不可端倪而其姓名亦並見此書中豈非趨附者繁梟鸞並集之一證哉總之儒者明體逹用當務潛修致逺通方當求實濟徒博衛道之名聚徒講學未有不水火交爭流毒及於宗社者東漢不鑒戰國之橫議南北部分而東漢亡北宋不鑒東漢之黨錮洛蜀黨分而北宋亡南宋不鑒元祐之敗偽學禁起而南宋亡明不鑒慶元之失東林勢盛而明又亡皆務彼虛名受其實禍決裂潰覆之後執門户之見者猶從而巧為之詞非公論也張端義貴耳集曰朝廷大患最怕攻黨伊川見道之明不能免焉淳熙則曰道學慶元則曰偽黨深思由來皆非國家之福斯言諒矣謹恭録御題冠此書之端用昭萬年之炯戒併詳著古來黨禍之由俾來者無惑焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀慶元黨禁原序古者左右前後罔非正人所以嚴其選於近習者慮至深也後世論親賢士逺小人必宫中府中俱為一體而作姦犯科付之有司所以嚴其法於近習者慮益逺矣慶元大臣得君之初收召羣賢一新庶政方將措天下於太平之盛而宫府之間近習竊柄一罅弗窒萬事瓦裂國家幾於危壞而不可救是則立紀綱嚴界限防微杜漸在君相可一日不加之意哉余於慶元黨禁而有感焉因記其首末淳祐乙巳至日滄洲樵叟序
